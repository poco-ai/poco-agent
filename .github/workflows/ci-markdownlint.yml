name: CI Markdownlint

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/ci-markdownlint.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/ci-markdownlint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2@0.22.0

      - name: Run markdownlint
        run: markdownlint-cli2
